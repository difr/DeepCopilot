name: Secret Scan (Gitleaks)

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  security-events: write   # 上传 SARIF 结果到 Security 标签页

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 扫描完整历史，不只扫最新 commit

      # 直接调用 gitleaks 二进制，绕开 gitleaks-action@v2 对 organization
      # 强制要求 GITLEAKS_LICENSE 的限制。扫描行为与官方 action 一致：
      # 命中泄露时以非零退出码失败，阻断 PR。
      - name: Install Gitleaks
        run: |
          set -euo pipefail
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: |
          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Upload SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
