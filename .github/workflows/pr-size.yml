name: PR Size Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count effective changed lines
        id: count
        run: |
          # 排除无需审查的文件，只统计有效业务代码变更行数
          ADDED=$(git diff --numstat origin/${{ github.base_ref }}...HEAD -- \
            ':(exclude)*.lock' \
            ':(exclude)*.md' \
            ':(exclude)package-lock.json' \
            ':(exclude)node_modules/**' \
            ':(exclude)out/**' \
            ':(exclude)dist/**' \
            ':(exclude)release/**' \
            ':(exclude)media/katex.min.js' \
            ':(exclude)media/purify.min.js' \
            ':(exclude)imgs/**' \
            ':(exclude)refine-logs/**' \
            | awk '{added+=$1; removed+=$2} END {print added+removed}')
          echo "lines=${ADDED:-0}" >> "$GITHUB_OUTPUT"
          echo "有效变更行数: ${ADDED:-0}"

      - name: Comment warning on large PR
        if: ${{ steps.count.outputs.lines > 500 }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "⚠️ **PR 偏大**：有效变更约 **${{ steps.count.outputs.lines }} 行**（建议阈值 500 行）。

          AI 审查在超大 diff 下质量会下降，建议：
          - 将无关改动拆分为独立 PR
          - 确保每个 PR 只聚焦一个功能或修复"
