version: 2
updates:
  # npm 依赖自动升级
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # 打包进 VSIX 的运行时依赖，大版本升级需人工验证渲染兼容性
      - dependency-name: "katex"
        update-types: ["version-update:semver-major"]
      - dependency-name: "dompurify"
        update-types: ["version-update:semver-major"]

  # GitHub Actions 自身版本自动升级（防止使用过期 action）
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci(deps)"
